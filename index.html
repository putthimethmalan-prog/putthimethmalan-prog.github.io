<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
  <style>
    body { font-family: Arial; background: #0f172a; color: white; }
    #chat { height: 300px; overflow-y: scroll; border: 1px solid #333; padding: 10px; }
    input { padding: 10px; margin: 5px; }
    button { padding: 10px; }
    img, video { max-width: 150px; border-radius: 10px; }
  </style>
</head>
<body>

<h2>💬 Chat</h2>

<div id="chat"></div>

<input id="msg" placeholder="พิมพ์ข้อความ...">
<input type="file" id="file">
<button onclick="send()">ส่ง</button>

<script>
const socket = io("http://localhost:3000");

function send() {
  const text = document.getElementById("msg").value;
  const fileInput = document.getElementById("file");

  if (fileInput.files[0]) {
    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    fetch("http://localhost:3000/upload", {
      method: "POST",
      body: formData
    })
    .then(res => res.json())
    .then(data => {
      socket.emit("sendMessage", {
        sender: "me",
        text,
        file: data.file
      });
    });

  } else {
    socket.emit("sendMessage", { sender: "me", text });
  }
}

socket.on("newMessage", (msg) => {
  const chat = document.getElementById("chat");

  let html = `<p><b>${msg.sender}:</b> ${msg.text}</p>`;

  if (msg.file) {
    if (msg.file.match(/mp4/)) {
      html += `<video src="http://localhost:3000/uploads/${msg.file}" controls></video>`;
    } else {
      html += `<img src="http://localhost:3000/uploads/${msg.file}">`;
    }
  }

  chat.innerHTML += html;
});
</script>

</body>
</html>
